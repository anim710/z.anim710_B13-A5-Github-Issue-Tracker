<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
     <script src="https://cdn.tailwindcss.com"></script>
  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="bg-[#e8eaed] min-h-screen flex items-center justify-center">
      <!-- Card -->
    <div class="bg-white rounded-xl shadow-lg w-full max-w-sm mx-4 px-10 py-10">

      <!-- GitHub Logo PNG -->
      <div class="flex justify-center mb-4">
        <img src="./assets/github-logo.png" alt="" class="w-16 h-16 rounded-full">
      </div>

      <!-- Title -->
      <h1 class="text-center text-[24px] font-bold text-gray-900 mb-1">
        GitHub Issues Tracker
      </h1>
      <p class="text-center text-sm text-gray-500 mb-6">
        Sign in to manage your issues
      </p>

      <!-- Form -->
      <form id="login-form" novalidate>

        <!-- Username -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input
            type="text"
            id="username"
            placeholder="Enter Username"
            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm text-gray-800 placeholder-gray-400 transition-all"
          />
          <span class="text-[14px] text-indigo-500 mt-1 block">Default: admin</span>
          <span class="text-[14px] text-red-500 mt-0.5 block min-h-[14px]" id="username-error"></span>
        </div>

        <!-- Password -->
        <div class="mb-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter Password"
            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm text-gray-800 placeholder-gray-400 transition-all"
          />
          <span class="text-[14px] text-indigo-500 mt-1 block">Default: admin123</span>
          <span class="text-[14px] text-red-500 mt-0.5 block min-h-[14px]" id="password-error"></span>
        </div>

        <!-- Global error -->
        <span class="block text-center text-[16px] text-red-500 min-h-[16px] mb-1" id="login-error"></span>

        <!-- Sign In Button -->
        <button
            id="sign-in-btn"
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] text-white font-semibold text-sm py-2.5 rounded-md transition-all shadow-md  cursor-pointer">Sign In</button>

      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-5">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-xs text-black">OR</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <!-- Demo Credentials -->
      <div class="text-center">
        <p class="text-xs text-gray-400 mb-1">Demo Credentials:</p>
        <p class="text-sm text-gray-700">
          <span class="font-semibold text-gray-900">Username:</span> admin
        </p>
        <p class="text-sm text-gray-700">
          <span class="font-semibold text-gray-900">Password:</span> admin123
        </p>
      </div>

    </div>
    <script src="./login.js"></script>
</body>
</html>
